<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Radar</title>
    <style>
        body {
            background-color: #09090b;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 0;
            zoom: 1.4;
        }

        .container {
            transform: scaleY(2);
        }

        body {
            padding: 250px 0;
        }

        /* Header (Uses float instead of flex) */
        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        h1 {
            color: #38bdf8;
            font-size: 34px;
            margin: 0;
            float: left;
        }

        .status {
            float: right;
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            margin-right: 15px;
        }

        /* Item Card (Uses float instead of flex) */
        .item-card {
            background: #1e1e24;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .avatar-img {
            float: left;
            width: 60px;
            height: 60px;
            background: #2a2a35;
            border-radius: 30px;
            text-align: center;
            line-height: 60px;
            font-size: 26px;
            font-weight: bold;
            color: #888;
            margin-right: 20px;
        }

        .user-info {
            float: left;
            margin-top: 2px;
        }

        .name {
            font-size: 28px;
            font-weight: bold;
        }

        .distance {
            font-size: 20px;
            color: #38bdf8;
            margin-top: 5px;
        }

        .actions-btn {
            background: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
        }

        .btn-float-right {
            float: right;
            margin-top: 10px;
        }
        
        .btn-full {
            float: none;
            width: 100%;
            display: block;
            margin-top: 15px;
            text-align: center;
        }

        input[type="text"] {
            width: 100%; 
            box-sizing: border-box; 
            background: #2a2a35; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 15px; 
            font-size: 18px; 
            border-radius: 8px; 
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- HEADER AREA -->
        <div class="header">
            <h1>SMART RADAR</h1>
            <button id="settingsBtn" class="actions-btn" style="float: right; margin-top: 0; padding: 7px 15px;">⚙️ Setup</button>
            <div id="topStatus" class="status">● Offline</div>
        </div>

        <!-- VIEW: RADAR LIST -->
        <div id="radarView">
            <div class="item-card">
                <div class="avatar-img">D</div>
                <div class="user-info">
                    <div class="name">Doctor Resident (dr22)</div>
                    <div class="distance">Loading cloud data...</div>
                </div>
                <button class="actions-btn btn-float-right">Profile</button>
            </div>
        </div>

        <!-- VIEW: SETTINGS / REGISTRATION -->
        <div id="settingsView" style="display: none;">
            <div class="item-card">
                <div class="name" style="margin-bottom: 10px; color: #38bdf8;">Database Connection</div>
                <div style="font-size: 18px; color: #aaa; margin-bottom: 20px; line-height: 1.4;">
                    Paste your personal Google Sheet link below to connect this HUD to your Cloud CRM Database.
                </div>
                
                <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
                <button id="registerBtn" class="actions-btn btn-full" style="background: #38bdf8; color: #09090b; font-weight: bold; border: none;">Connect Database</button>
                <div id="registerMsg" style="margin-top: 15px; font-size: 18px; color: #4ade80; text-align: center;"></div>
            </div>
            
            <button id="backBtn" class="actions-btn btn-full" style="color: #888; border-color: #444;">← Back to Radar</button>
        </div>

    </div>

    <!-- MAIN LOGIC -->
    <script>
        // ==========================================
        // 1. IMPORTANT: PASTE YOUR APP SCRIPT URL HERE
        // ==========================================
        const MASTER_ENGINE_URL = "https://script.google.com/macros/s/AKfycbxmP0JWumHog423X-Dq8ZIEYtDoJagl2YCOAd1Lse2I4tyX8mzl2mytkI8Z9uj37OeX/exec";

        // Extract the user's UUID from the URL parameter we set in LSL!
        const urlParams = new URLSearchParams(window.location.search);
        const userUUID = urlParams.get('uuid');

        // ==========================================
        // 2. UI NAVIGATION LOGIC
        // ==========================================
        const radarView = document.getElementById('radarView');
        const settingsView = document.getElementById('settingsView');

        document.getElementById('settingsBtn').onclick = function() {
            radarView.style.display = 'none';
            settingsView.style.display = 'block';
        };

        document.getElementById('backBtn').onclick = function() {
            settingsView.style.display = 'none';
            radarView.style.display = 'block';
        };

        // ==========================================
        // 3. API LOGIC: REGISTER USER'S SHEET
        // ==========================================
        document.getElementById('registerBtn').onclick = async function() {
            if (!userUUID) {
                alert("Error: Missing UUID! You must run this inside Second Life.");
                return;
            }

            const sheetUrl = document.getElementById('sheetUrlInput').value;
            const msgBox = document.getElementById('registerMsg');
            
            if (!sheetUrl) {
                msgBox.style.color = "#ef4444";
                msgBox.innerText = "Please paste your sheet URL!";
                msgBox.style.display = "block";
                return;
            }

            // Connecting state
            this.innerText = "Connecting...";
            msgBox.style.color = "#38bdf8";
            msgBox.innerText = "Reaching Master Engine...";
            msgBox.style.display = "block";

            try {
                // Call the API (action=register)
                const formData = new FormData();
                formData.append('action', 'register');
                formData.append('uuid', userUUID);
                formData.append('sheetUrl', sheetUrl);
                // (Note: we didn't pass name here because we don't have it natively in JS, but LSL does!)

                const response = await fetch(MASTER_ENGINE_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    msgBox.style.color = "#4ade80";
                    msgBox.innerText = "Success! Database Connected!";
                    this.innerText = "Connected";
                } else {
                    throw new Error(result.message);
                }

            } catch (err) {
                msgBox.style.color = "#ef4444";
                msgBox.innerText = "Error: " + err.message;
                this.innerText = "Try Again";
            }
        };
    </script>
</body>

</html>
