<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM HUD</title>
    <style>
        /* BASE THEME & SL RENDERING HACKS */
        body {
            background-color: #09090b;
            color: #f8fafc;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            zoom: 2;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVIGATION TABS (Sticky) */
        .nav-tabs {
            position: sticky;
            top: 0;
            background: #09090b;
            border-bottom: 2px solid #27272a;
            margin-bottom: 20px;
            overflow: hidden;
            display: none;
            z-index: 1000;
        }

        .tab-btn {
            float: left;
            background: transparent;
            border: none;
            color: #71717a;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }

        /* VIEWS */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* LOADING SCREEN */
        #loadingView {
            text-align: center;
            padding-top: 100px;
            font-size: 24px;
            color: #71717a;
        }

        /* WELCOME / SETUP VIEW */
        .welcome-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-header h1 {
            color: #38bdf8;
            font-size: 48px;
            margin-bottom: 10px;
        }

        .instruction-box {
            background: #18181b;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .step {
            margin-bottom: 15px;
            font-size: 19px;
        }

        .step-num {
            display: inline-block;
            width: 32px;
            height: 32px;
            background: #38bdf8;
            color: #000;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            margin-right: 12px;
            font-weight: bold;
        }

        /* UI COMPONENTS */
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 2px solid #38bdf8;
            color: #fff;
            padding: 25px;
            font-size: 22px;
            border-radius: 12px;
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* LIST ITEMS */
        .item {
            border-bottom: 1px solid #27272a;
            padding: 15px 0;
            min-height: 60px;
            overflow: hidden;
            display: flex;
            /* Using flex for icon alignment if possible, otherwise float */
            align-items: center;
            justify-content: space-between;
        }

        .item-info {
            flex-grow: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            color: #38bdf8;
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
        }

        .item-actions {
            display: flex;
            gap: 12px;
            margin-left: 15px;
        }

        .action-icon {
            background: #27272a;
            color: #f8fafc;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-icon:hover {
            background: #38bdf8;
            color: #000;
        }

        .action-icon.add-btn {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        .status-msg {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- NAVIGATION (Sticky) -->
        <nav id="mainNav" class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('radar')">Radar</button>
            <button class="tab-btn" onclick="showTab('contacts')">Contacts</button>
            <button class="tab-btn" onclick="showTab('settings')">Settings</button>
        </nav>
        <div id="syncStatus"
            style="font-size: 10px; color: #71717a; text-align: center; padding: 4px; border-bottom: 1px solid #27272a; display: flex; justify-content: center; align-items: center; gap: 8px;">
            <span id="syncText">Connecting...</span>
            <button onclick="checkStatus(true)"
                style="background:none; border:none; color:#38bdf8; cursor:pointer; font-size:12px; padding:0; display:flex;"
                title="Sync Now">🔄</button>
        </div>

        <!-- VIEWS -->
        <div id="loadingView" class="view active">
            <div style="text-align:center; margin-top:50px;">
                <div class="loader"></div>
                <div style="margin-top:20px; color:#71717a;">Connecting to SCM Cloud...</div>
            </div>
        </div>

        <div id="welcomeView" class="view">
            <div class="welcome-header">
                <h1>Welcome to SCM</h1>
            </div>
            <div class="instruction-box">
                <div class="step"><span class="step-num">1</span> Create a blank Google Sheet.</div>
                <div class="step"><span class="step-num">2</span> <b>Share</b> as "Public" OR add Access to: <b
                        style="color:#38bdf8">ataurbdc16@gmail.com</b></div>
                <div class="step"><span class="step-num">3</span> Paste the Sheet URL below.</div>
            </div>
            <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
            <button id="registerBtn" class="btn" style="margin-top:20px;" onclick="handleRegister()">Connect
                Database</button>
            <div id="setupStatus" class="status-msg"></div>
        </div>

        <div id="radarTab" class="view dashboard-tab">
            <div class="card">
                <div id="radarList"></div>
            </div>
        </div>

        <div id="contactsTab" class="view dashboard-tab">
            <div class="card">
                <div id="contactsList">
                    <p style="color:#71717a; text-align:center;">No contacts saved.</p>
                </div>
            </div>
        </div>

        <div id="settingsTab" class="view dashboard-tab">
            <div class="card">
                <h2 style="margin-top:0; color:#38bdf8;">Settings</h2>
                <div style="margin-bottom:20px;">
                    <p style="font-size:12px; color:#71717a;">Database: Registered</p>
                </div>
                <button class="btn" style="background:#ef4444; color:#fff;" onclick="showView('welcomeView')">Reset
                    Database Connection</button>
            </div>
        </div>
    </div>

    <script>
        const MASTER_ENGINE_URL = "https://script.google.com/macros/s/AKfycbxmP0JWumHog423X-Dq8ZIEYtDoJagl2YCOAd1Lse2I4tyX8mzl2mytkI8Z9uj37OeX/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const userUUID = urlParams.get('uuid');
        const userName = urlParams.get('name');
        let refreshInterval;

        window.onload = () => {
            if (userUUID) {
                initHUD();
            } else {
                document.getElementById('loadingView').innerHTML = `<div style="text-align:center; padding:50px; color:#ef4444;">Please run this HUD from Second Life.</div>`;
            }
        };

        async function initHUD() {
            await checkStatus();
            if (!refreshInterval) refreshInterval = setInterval(() => checkStatus(false), 15000);
        }

        async function checkStatus(isManual = false) {
            try {
                const statusEl = document.getElementById('syncText');
                if (isManual) statusEl.innerText = "Syncing...";

                const response = await fetch(`${MASTER_ENGINE_URL}?action=get_data&uuid=${userUUID}&name=${encodeURIComponent(userName)}`);
                if (!response.ok) throw new Error("Server connection failed (HTTP " + response.status + ")");

                const result = await response.json();

                if (result.status === "success") {
                    renderData(result);
                    updateSyncTime();
                } else if (result.status === "unregistered") {
                    showView('welcomeView');
                    statusEl.innerText = "Registration Required";
                } else if (result.status === "error") {
                    showErrorInRadar(result.message);
                }
            } catch (err) {
                console.error(err);
                showErrorInRadar("Connectivity Error: Could not reach Master Engine.");
            }
        }

        function showErrorInRadar(msg) {
            const list = document.getElementById('radarList');
            if (list) {
                list.innerHTML = `
                    <div style="padding:40px 20px; text-align:center; color:#ef4444;">
                        <div style="font-size:32px; margin-bottom:15px;">⚠️</div>
                        <div style="font-weight:bold; margin-bottom:8px; color:#fff;">Connection Lost</div>
                        <div style="font-size:12px; color:#71717a; line-height:1.5;">${msg}</div>
                        <button class="btn" style="margin-top:20px; padding:8px 20px; font-size:11px;" onclick="checkStatus(true)">Try Reconnect</button>
                    </div>
                `;
            }
            const statusEl = document.getElementById('syncText');
            if (statusEl) statusEl.innerText = "Status: Sync Error";

            // If we're on the loading screen, jump to radar to show the error
            const currentView = document.querySelector('.view.active');
            if (currentView.id === 'loadingView') showTab('radar');
        }

        function updateSyncTime() {
            const el = document.getElementById('syncText');
            if (el) el.innerText = "Data Synced: " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(viewId);
            if (target) {
                target.classList.add('active');
                document.getElementById('mainNav').style.display = target.classList.contains('dashboard-tab') ? 'block' : 'none';
            }
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabName));
            showView(tabName + 'Tab');
        }

        function renderData(result) {
            const currentView = document.querySelector('.view.active');
            if (currentView.id === 'loadingView' || currentView.id === 'welcomeView') showTab('radar');

            renderRadarList(result.data.radar || [], result.requested_date || "Today", result.server_time, result.settings?.radar_scan_freq || 10);
            renderContacts(result.data.contacts || []);
        }

        function renderRadarList(items, dateShown, serverTime, scanFreq) {
            const list = document.getElementById('radarList');
            const summary = `<div style="font-size:11px; color:#71717a; margin-bottom:15px; border-bottom:1px solid #27272a; padding-bottom:10px;">Showing history for: <b style="color:#38bdf8">${dateShown}</b></div>`;

            if (items.length === 0) {
                list.innerHTML = summary + `
                    <div style="padding:40px 10px; text-align:center;">
                        <div style="font-size:24px; margin-bottom:10px;">🔍</div>
                        <div style="color:#71717a; font-size:14px;">No records found for this date.</div>
                        <div style="font-size:11px; color:#52525b; margin-top:8px;">Ensure your HUD is attached and scanning.</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = summary + items.map(p => {
                const formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: 'America/Los_Angeles'
                }) : "??:??";
                const first = formatTime(p.first_seen);
                const last = formatTime(p.last_seen);

                const lastTs = new Date(p.last_seen).getTime();
                const serverTs = new Date(serverTime).getTime();

                // If the person was seen in the last scan window (plus 5s safety), they are LIVE
                const isLive = (serverTs - lastTs) < ((scanFreq + 5) * 1000);
                const badge = isLive ? '<span class="badge live">LIVE</span>' : "";

                const rowDate = p.date ? new Date(p.date + "T00:00:00Z").toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : "";
                const location = p.last_sim && p.last_sim !== "Unknown" ? ` in ${p.last_sim}` : "";

                return `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${p.name} ${statusBadge}</div>
                        <div class="item-meta">${rowDate} | ${first} - ${last}${location}</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-icon" title="View Profile" onclick="openLink('about','${p.key}')">👤</button>
                        <button class="action-icon" title="Send IM" onclick="openLink('im','${p.key}')">💬</button>
                        <button class="action-icon add-btn" title="Add Contact">➕</button>
                    </div>
                </div>
            `}).join('');
        }

        function renderContacts(items) {
            const list = document.getElementById('contactsList');
            if (items.length === 0) return;
            list.innerHTML = items.map(c => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${c.name}</div>
                        <div class="item-meta">${c.notes || "No notes."}</div>
                    </div>
                </div>
            `).join('');
        }

        function openLink(type, uuid) {
            window.location.href = `secondlife:///app/agent/${uuid}/${type}`;
        }

        async function handleRegister() {
            const sheetUrl = document.getElementById('sheetUrlInput').value;
            if (!sheetUrl) return;
            const btn = document.getElementById('registerBtn');
            const status = document.getElementById('setupStatus');

            btn.disabled = true;
            status.innerText = "Syncing Database Architecture...";

            try {
                const fd = new FormData();
                fd.append('action', 'register'); fd.append('uuid', userUUID); fd.append('name', userName); fd.append('sheetUrl', sheetUrl);
                const res = await fetch(MASTER_ENGINE_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if (result.status === "success") {
                    status.innerText = "Success! Initializing Radar...";
                    setTimeout(initHUD, 1000);
                } else throw new Error(result.message);
            } catch (err) {
                status.innerText = "Error: " + err.message;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>

</html>
