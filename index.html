<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM HUD</title>
    <style>
        /* BASE THEME & SL RENDERING HACKS */
        body {
            background-color: #09090b;
            color: #f8fafc;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            zoom: 2;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVIGATION TABS (Sticky) */
        .nav-tabs {
            position: sticky;
            top: 0;
            background: #09090b;
            border-bottom: 2px solid #27272a;
            margin-bottom: 20px;
            overflow: hidden;
            display: none;
            z-index: 1000;
        }

        .tab-btn {
            float: left;
            background: transparent;
            border: none;
            color: #71717a;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }

        /* VIEWS */
        .view { display: none; }
        .view.active { display: block; }

        /* LOADING SCREEN */
        #loadingView { text-align: center; padding-top: 100px; font-size: 24px; color: #71717a; }

        /* WELCOME / SETUP VIEW */
        .welcome-header { text-align: center; margin-bottom: 40px; }
        .welcome-header h1 { color: #38bdf8; font-size: 48px; margin-bottom: 10px; }
        .instruction-box {
            background: #18181b;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .step { margin-bottom: 15px; font-size: 19px; }
        .step-num { 
            display: inline-block; 
            width: 32px; height: 32px; 
            background: #38bdf8; color: #000; 
            border-radius: 50%; text-align: center; 
            line-height: 32px; margin-right: 12px; 
            font-weight: bold;
        }

        /* UI COMPONENTS */
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 2px solid #38bdf8;
            color: #fff;
            padding: 25px;
            font-size: 22px;
            border-radius: 12px;
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* LIST ITEMS */
        .item {
            border-bottom: 1px solid #27272a;
            padding: 15px 0;
            min-height: 60px;
            overflow: hidden;
            display: flex; /* Using flex for icon alignment if possible, otherwise float */
            align-items: center;
            justify-content: space-between;
        }

        .item-info { flex-grow: 1; min-width: 0; }
        .item-name { font-size: 22px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { color: #38bdf8; font-size: 16px; font-weight: 600; margin-top: 4px; }

        .item-actions {
            display: flex;
            gap: 12px;
            margin-left: 15px;
        }

        .action-icon {
            background: #27272a;
            color: #f8fafc;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-icon:hover { background: #38bdf8; color: #000; }
        .action-icon.add-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid #38bdf8; }

        .status-msg { margin-top: 15px; text-align: center; font-size: 18px; }
    </style>
</head>

<body>
    <div class="container">

        <!-- NAVIGATION (Sticky) -->
        <nav id="mainNav" class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('radar')">Radar</button>
            <button class="tab-btn" onclick="showTab('contacts')">Contacts</button>
            <button class="tab-btn" onclick="showTab('settings')">Settings</button>
        </nav>
        <div id="syncStatus" style="font-size: 10px; color: #71717a; text-align: center; padding: 4px; border-bottom: 1px solid #27272a;">Connecting...</div>

        <!-- VIEWS -->
        <div id="loadingView" class="view active">
            Connecting to SCM Cloud...
        </div>

        <div id="welcomeView" class="view">
            <div class="welcome-header"><h1>Welcome to SCM</h1></div>
            <div class="instruction-box">
                <div class="step"><span class="step-num">1</span> Create a blank Google Sheet.</div>
                <div class="step"><span class="step-num">2</span> <b>Share</b> as "Public" OR add Access to: <b style="color:#38bdf8">ataurbdc16@gmail.com</b></div>
                <div class="step"><span class="step-num">3</span> Paste the Sheet URL below.</div>
            </div>
            <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
            <button id="registerBtn" class="btn" style="margin-top:20px;" onclick="handleRegister()">Connect Database</button>
            <div id="setupStatus" class="status-msg"></div>
        </div>

        <div id="radarTab" class="view dashboard-tab">
            <div style="padding: 10px 0; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
                <div id="displayDate" style="font-size: 18px; font-weight: bold; color: #38bdf8;">Loading date...</div>
                <input type="date" id="dateFilter" style="background:#18181b; color:#fff; border:1px solid #38bdf8; padding:5px; border-radius:4px; font-size:14px;" onchange="handleDateChange()">
            </div>
            <div class="card"><div id="radarList"></div></div>
        </div>

        <div id="contactsTab" class="view dashboard-tab">
            <div class="card"><div id="contactsList"><p style="color:#71717a; text-align:center;">No contacts saved.</p></div></div>
        </div>

        <div id="settingsTab" class="view dashboard-tab">
            <div class="card">
                <h2 style="margin-top:0; color:#38bdf8;">Settings</h2>
                <button class="btn" style="background:#ef4444; color:#fff;" onclick="showView('welcomeView')">Reset Database Connection</button>
            </div>
        </div>

    </div>

    <script>
        const MASTER_ENGINE_URL = "https://script.google.com/macros/s/AKfycbxmP0JWumHog423X-Dq8ZIEYtDoJagl2YCOAd1Lse2I4tyX8mzl2mytkI8Z9uj37OeX/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const userUUID = urlParams.get('uuid');
        const userName = urlParams.get('name');
        let refreshInterval;

        window.onload = () => { 
            if (userUUID) {
                initDateFilter();
                initHUD();
            } else {
                document.getElementById('loadingView').innerHTML = "Run from SL HUD.";
            }
        };

        function initDateFilter() {
            const input = document.getElementById('dateFilter');
            // Estimate SL date (UTC-7/8) while waiting for server sync
            const slEst = new Date(new Date().getTime() - (7 * 3600000)); 
            const dateStr = slEst.toISOString().split('T')[0];
            input.value = dateStr;
            document.getElementById('displayDate').innerText = formatFullDate(dateStr);
        }

        function formatFullDate(dateStr) {
            if (!dateStr) return "Select Date";
            // Explicitly parse YYYY-MM-DD to avoid timezone shifts
            const parts = dateStr.split('-');
            const d = new Date(Date.UTC(parts[0], parts[1]-1, parts[2]));
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const formatted = d.toLocaleDateString('en-GB', { ...options, timeZone: 'UTC' });
            const fParts = formatted.split(' ');
            if (fParts.length === 3) return `${fParts[0]} ${fParts[1]}, ${fParts[2]}`;
            return formatted;
        }

        function handleDateChange() {
            const dateStr = document.getElementById('dateFilter').value;
            document.getElementById('displayDate').innerText = formatFullDate(dateStr);
            checkStatus();
        }

        async function initHUD() {
            await checkStatus();
            if (!refreshInterval) refreshInterval = setInterval(checkStatus, 15000); // 15s for HUD stability
        }

        async function checkStatus() {
            try {
                const dateInput = document.getElementById('dateFilter');
                const date = dateInput.value;
                const response = await fetch(`${MASTER_ENGINE_URL}?action=get_data&uuid=${userUUID}&name=${encodeURIComponent(userName)}&date=${date}`);
                const result = await response.json();
                if (result.status === "success") {
                    // Sync HUD to server's SL date if not already set or specifically requested
                    if (result.server_sl_date && !date) {
                        dateInput.value = result.server_sl_date;
                        document.getElementById('displayDate').innerText = formatFullDate(result.server_sl_date);
                    }
                    renderData(result.data, result.server_time);
                    updateSyncTime();
                } else if (result.status === "error" && result.message.includes("Mapping")) {
                    showView('welcomeView');
                }
            } catch (err) { console.error(err); }
        }

        function updateSyncTime() {
            const el = document.getElementById('syncStatus');
            if (el) el.innerText = "Cloud Sync: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('mainNav').style.display = document.getElementById(viewId).classList.contains('dashboard-tab') ? 'block' : 'none';
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabName));
            showView(tabName + 'Tab');
        }

        function renderData(data, serverTimeMs) {
            const currentView = document.querySelector('.view.active');
            if (currentView.id === 'loadingView' || currentView.id === 'welcomeView') showTab('radar');
            
            const radar = data.radar || [];
            renderRadarList(radar);
            renderContacts(data.contacts || []);
        }

        function renderRadarList(items) {
            const list = document.getElementById('radarList');
            if (items.length === 0) { list.innerHTML = `<div class="status-msg">No entries for this date.</div>`; return; }
            
            list.innerHTML = items.map(p => {
                const formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "??:??";
                const first = formatTime(p.first_seen);
                const last = formatTime(p.last_seen);
                const statusBadge = p.is_nearby ? '<span style="background:#22c55e; color:#000; padding:2px 6px; border-radius:4px; font-size:10px; margin-left:8px; vertical-align:middle;">LIVE</span>' : '';
                const location = p.last_sim && p.last_sim !== "Unknown" ? ` in ${p.last_sim}` : "";
                
                return `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${p.name} ${statusBadge}</div>
                        <div class="item-meta">Seen: ${first} - ${last}${location} (${Math.round(p.dist || 0)}m)</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-icon" title="View Profile" onclick="openLink('about','${p.key}')">👤</button>
                        <button class="action-icon" title="Send IM" onclick="openLink('im','${p.key}')">💬</button>
                        <button class="action-icon add-btn" title="Add Contact">➕</button>
                    </div>
                </div>
            `}).join('');
        }

        function renderContacts(items) {
            const list = document.getElementById('contactsList');
            if (items.length === 0) return;
            list.innerHTML = items.map(c => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${c.name}</div>
                        <div class="item-meta">${c.notes || "No notes."}</div>
                    </div>
                </div>
            `).join('');
        }

        function openLink(type, uuid) {
            window.location.href = `secondlife:///app/agent/${uuid}/${type}`;
        }

        async function handleRegister() {
            const sheetUrl = document.getElementById('sheetUrlInput').value;
            if (!sheetUrl) return;
            document.getElementById('setupStatus').innerText = "Connecting...";
            try {
                const fd = new FormData();
                fd.append('action', 'register'); fd.append('uuid', userUUID); fd.append('name', userName); fd.append('sheetUrl', sheetUrl);
                const res = await fetch(MASTER_ENGINE_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if (result.status === "success") initHUD(); else throw new Error(result.message);
            } catch (err) { document.getElementById('setupStatus').innerText = "Error: " + err.message; }
        }
    </script>
</body>

</html>
</body>

</html>
