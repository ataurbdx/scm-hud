<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM HUD</title>
    <!-- <link rel="stylesheet" href="assets/style.css"> -->

    <style>
        /* ===== STRUCTURE CSS (your original, kept) ===== */

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            margin: 0;
        }

        .hud-container {
            transform: scaleY(1.9);
        }

        .hud-scale {
            zoom: 3;
            margin-top: 80.8px;
        }

        .hud-content {
            height: 179.7px;
            overflow: hidden;

            display: flex;
            flex-direction: column;
        }

        /* Make each page its own Flexbox Workspace when visible */
        .spa-page {
            display: none;
            flex: 1;
            min-height: 0; /* CRITICAL for nested flexbox bounds */
            width: 100%;
            flex-direction: column;
        }

        .spa-page.active {
            display: flex;
        }

        .spa-page header {
            background: green;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .spa-page footer {
            background: green;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .spa-page main {
            background: red;
            flex: 1;
            min-height: 0; /* CRITICAL for internal scrolling */
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <!-- new hud design start  -->
    <div class="hud-root">
        <div class="hud-container">
            <div class="hud-scale">
                <div class="hud-content">

                    <!-- PAGE 1: PRELOADER (Notice: No Header or Footer!) -->
                    <div id="page-preloader" class="spa-page">
                        <main
                            style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e0e0e0;">
                            <h2 style="color: #333;">Connecting...</h2>
                            <p style="font-size: 0.8em; color: #666;">Syncing with SCM Master Registry</p>
                        </main>
                    </div>

                    <!-- PAGE 2: DATABASE SETUP (Notice: Has a Header, No Footer!) -->
                    <div id="page-setup" class="spa-page active">
                        <header style="text-align: center; color: white;">Setup Required</header>
                        <main style="padding: 10px; text-align: center; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <h3 style="margin-bottom: 5px; color: darkred;">Database Not Found</h3>
                            <p style="font-size: 0.8em; margin-bottom: 10px;">Register your Google App URL.</p>

                        </main>
                        <footer
                            style="display: flex; flex-direction: row; align-items: center; justify-content: space-between;">
                            <input type="text" placeholder="https://..." style="margin-bottom: 10px; display: block;">
                            <button
                                style="padding: 5px 15px; cursor: pointer; background: #333; color: white;">Connect</button>
                        </footer>
                    </div>

                    <!-- PAGE 3: RADAR / MAIN UI (Notice: Has Both Header AND Footer!) -->
                    <div id="page-radar" class="spa-page">
                        <header>Radar Menu</header>
                        <main style="padding: 10px; background: #fff;">
                            <h3 style="margin-bottom: 5px;">Nearby Avatars</h3>
                            <ul style="list-style: none; padding: 0; margin: 0; font-size: 0.9em;">
                                <li style="padding: 5px; border-bottom: 1px solid #ccc;">Waiting for radar ping...</li>
                            </ul>
                        </main>
                        <footer>Footer Menu / Icons</footer>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Now that the CSS Flexbox has min-height: 0, it perfectly calculates sub-pixels itself!
        // We do NOT want to explicitly set main.style.height using JS anymore!
        // JS offsetHeight returns integers (e.g. 21px).
        // CSS resolves decimals exactly (e.g. 21.2px) inside a total 179.7px container.
        // Forcing a JS integer height makes the boxes mathematically overflow by 0.5px.
        function updateMainHeight() {
             // Let CSS Flexbox do 100% of the work. 
        }

        // Run on load and resize
        window.addEventListener('load', updateMainHeight);
        window.addEventListener('resize', updateMainHeight);
        document.addEventListener('DOMContentLoaded', updateMainHeight);

        // EXTRA PRO TIP: Observe ALL headers and footers for dynamic changes
        const observer = new ResizeObserver(() => {
            updateMainHeight();
        });

        window.addEventListener('load', () => {
            const headers = document.querySelectorAll('header');
            const footers = document.querySelectorAll('footer');

            headers.forEach(h => observer.observe(h));
            footers.forEach(f => observer.observe(f));
        });
    </script>
    <!-- new hud design end  -->
</body>

</html>
