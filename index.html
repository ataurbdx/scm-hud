<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Radar</title>
    <style>
        body {
            background-color: #09090b;
            color: #f8fafc;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 0;
            zoom: 1.4;
        }

        .container {
            transform: scaleY(2);
        }

        body {
            padding: 250px 0;
        }

        /* Header (Uses float instead of flex) */
        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        h1 {
            color: #38bdf8;
            font-size: 34px;
            margin: 0;
            float: left;
        }

        .status {
            float: right;
            color: #4ade80;
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Item Card (Uses float instead of flex) */
        .item-card {
            background: #1e1e24;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .avatar-img {
            float: left;
            width: 60px;
            height: 60px;
            background: #2a2a35;
            border-radius: 30px;
            text-align: center;
            line-height: 60px;
            font-size: 26px;
            font-weight: bold;
            color: #888;
            margin-right: 20px;
        }

        .user-info {
            float: left;
            margin-top: 2px;
        }

        .name {
            font-size: 28px;
            font-weight: bold;
        }

        .distance {
            font-size: 20px;
            color: #38bdf8;
            margin-top: 5px;
        }

        .actions-btn {
            float: right;
            background: transparent;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 20px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>SMART RADAR</h1>
            <div class="status">● Online</div>
        </div>

        <div id="radarList">
            <!-- Demo Users -->
            <div class="item-card">
                <div class="avatar-img">A</div>
                <div class="user-info">
                    <div class="name">Alice Resident</div>
                    <div class="distance">15m away</div>
                </div>
                <button class="actions-btn">Profile</button>
            </div>

            <div class="item-card">
                <div class="avatar-img">B</div>
                <div class="user-info">
                    <div class="name">Bob Resident</div>
                    <div class="distance">22m away</div>
                </div>
                <button class="actions-btn">Profile</button>
            </div>

            <div class="item-card" style="opacity: 0.6;">
                <div class="avatar-img">C</div>
                <div class="user-info">
                    <div class="name">Charlie Resident</div>
                    <div class="distance">45m away</div>
                </div>
                <button class="actions-btn">Profile</button>
            </div>
        </div>

    </div>
</body>

</html>
