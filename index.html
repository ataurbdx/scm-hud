<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCM HUD</title>
    <style>
        /* BASE THEME & SL RENDERING HACKS */
        body {
            background-color: #09090b;
            color: #f8fafc;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            zoom: 2;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVIGATION TABS (Sticky) */
        .nav-tabs {
            position: sticky;
            top: 0;
            background: #09090b;
            border-bottom: 2px solid #27272a;
            margin-bottom: 20px;
            overflow: hidden;
            display: none;
            z-index: 1000;
        }

        .tab-btn {
            float: left;
            background: transparent;
            border: none;
            color: #71717a;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }

        /* VIEWS */
        .view { display: none; }
        .view.active { display: block; }

        /* LOADING SCREEN */
        #loadingView { text-align: center; padding-top: 100px; font-size: 24px; color: #71717a; }

        /* WELCOME / SETUP VIEW */
        .welcome-header { text-align: center; margin-bottom: 40px; }
        .welcome-header h1 { color: #38bdf8; font-size: 48px; margin-bottom: 10px; }
        .instruction-box {
            background: #18181b;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .step { margin-bottom: 15px; font-size: 19px; }
        .step-num { 
            display: inline-block; 
            width: 32px; height: 32px; 
            background: #38bdf8; color: #000; 
            border-radius: 50%; text-align: center; 
            line-height: 32px; margin-right: 12px; 
            font-weight: bold;
        }

        /* UI COMPONENTS */
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 2px solid #38bdf8;
            color: #fff;
            padding: 25px;
            font-size: 22px;
            border-radius: 12px;
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        /* LIST ITEMS */
        .item {
            border-bottom: 1px solid #27272a;
            padding: 15px 0;
            min-height: 60px;
            overflow: hidden;
            display: flex; /* Using flex for icon alignment if possible, otherwise float */
            align-items: center;
            justify-content: space-between;
        }

        .item-info { flex-grow: 1; min-width: 0; }
        .item-name { font-size: 22px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-meta { color: #38bdf8; font-size: 16px; font-weight: 600; margin-top: 4px; }

        .item-actions {
            display: flex;
            gap: 12px;
            margin-left: 15px;
        }

        .action-icon {
            background: #27272a;
            color: #f8fafc;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-icon:hover { background: #38bdf8; color: #000; }
        .action-icon.add-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid #38bdf8; }

        .status-msg { margin-top: 15px; text-align: center; font-size: 18px; }
    </style>
</head>

<body>
    <div class="container">

        <!-- NAVIGATION (Sticky) -->
        <div id="mainNav" class="nav-tabs">
            <button class="tab-btn active" onclick="showTab('nearby')">Nearby</button>
            <button class="tab-btn" onclick="showTab('history')">History</button>
            <button class="tab-btn" onclick="showTab('contacts')">Contacts</button>
            <button class="tab-btn" onclick="showTab('settings')">Settings</button>
        </div>

        <!-- VIEWS -->
        <div id="loadingView" class="view active">
            Connecting to SCM Cloud...
        </div>

        <div id="welcomeView" class="view">
            <div class="welcome-header"><h1>Welcome to SCM</h1></div>
            <div class="instruction-box">
                <div class="step"><span class="step-num">1</span> Create a blank Google Sheet.</div>
                <div class="step"><span class="step-num">2</span> <b>Share</b> as "Public" OR add Access to: <b style="color:#38bdf8">ataurbdc16@gmail.com</b></div>
                <div class="step"><span class="step-num">3</span> Paste the Sheet URL below.</div>
            </div>
            <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/...">
            <button id="registerBtn" class="btn" style="margin-top:20px;" onclick="handleRegister()">Connect Database</button>
            <div id="setupStatus" class="status-msg"></div>
        </div>

        <div id="nearbyTab" class="view dashboard-tab">
            <div class="card"><div id="radarList"></div></div>
        </div>

        <div id="historyTab" class="view dashboard-tab">
            <div class="card"><div id="historyList"></div></div>
        </div>

        <div id="contactsTab" class="view dashboard-tab">
            <div class="card"><div id="contactsList"><p style="color:#71717a; text-align:center;">No contacts saved.</p></div></div>
        </div>

        <div id="settingsTab" class="view dashboard-tab">
            <div class="card">
                <h2 style="margin-top:0; color:#38bdf8;">Settings</h2>
                <button class="btn" style="background:#ef4444; color:#fff;" onclick="showView('welcomeView')">Reset Database Connection</button>
            </div>
        </div>

    </div>

    <script>
        const MASTER_ENGINE_URL = "https://script.google.com/macros/s/AKfycbxmP0JWumHog423X-Dq8ZIEYtDoJagl2YCOAd1Lse2I4tyX8mzl2mytkI8Z9uj37OeX/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const userUUID = urlParams.get('uuid');
        const userName = urlParams.get('name');
        let refreshInterval;

        window.onload = () => { if (userUUID) initHUD(); else document.getElementById('loadingView').innerHTML = "Run from SL HUD."; };

        async function initHUD() {
            await checkStatus();
            if (!refreshInterval) refreshInterval = setInterval(checkStatus, 10000);
        }

        async function checkStatus() {
            try {
                const response = await fetch(`${MASTER_ENGINE_URL}?action=get_data&uuid=${userUUID}`);
                const result = await response.json();
                if (result.status === "success") renderData(result.data); else showView('welcomeView');
            } catch (err) { console.error(err); }
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('mainNav').style.display = document.getElementById(viewId).classList.contains('dashboard-tab') ? 'block' : 'none';
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === tabName));
            showView(tabName + 'Tab');
        }

        function renderData(data) {
            const currentView = document.querySelector('.view.active');
            if (currentView.id === 'loadingView' || currentView.id === 'welcomeView') showTab('nearby');
            
            const now = new Date();
            const rawRadar = data.radar || [];
            
            // NEARBY: Seen < 90 seconds ago, Sorted by Distance (Closest First)
            const nearby = rawRadar.filter(p => (now - new Date(p.last_seen)) < 90000)
                                   .sort((a, b) => (a.dist || 0) - (b.dist || 0));
            
            // HISTORY: Everyone else
            const history = rawRadar.sort((a, b) => new Date(b.last_seen) - new Date(a.last_seen));

            renderList('radarList', nearby, true);
            renderList('historyList', history, false);
            renderContacts(data.contacts || []);
        }

        function renderList(targetId, items, isNearby) {
            const list = document.getElementById(targetId);
            if (items.length === 0) { list.innerHTML = `<div class="status-msg">No ${isNearby ? 'neighbors' : 'history'} found.</div>`; return; }
            
            list.innerHTML = items.map(p => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${p.name}</div>
                        <div class="item-meta">${Math.round(p.dist || 0)}m range</div>
                    </div>
                    <div class="item-actions">
                        <button class="action-icon" title="View Profile" onclick="openLink('about','${p.key}')">👤</button>
                        <button class="action-icon" title="Send IM" onclick="openLink('im','${p.key}')">💬</button>
                        <button class="action-icon add-btn" title="Add Contact">➕</button>
                    </div>
                </div>
            `).join('');
        }

        function openLink(type, uuid) {
            window.location.href = `secondlife:///app/agent/${uuid}/${type}`;
        }

        async function handleRegister() {
            const sheetUrl = document.getElementById('sheetUrlInput').value;
            if (!sheetUrl) return;
            document.getElementById('setupStatus').innerText = "Connecting...";
            try {
                const fd = new FormData();
                fd.append('action', 'register'); fd.append('uuid', userUUID); fd.append('name', userName); fd.append('sheetUrl', sheetUrl);
                const res = await fetch(MASTER_ENGINE_URL, { method: 'POST', body: fd });
                const result = await res.json();
                if (result.status === "success") initHUD(); else throw new Error(result.message);
            } catch (err) { document.getElementById('setupStatus').innerText = "Error: " + err.message; }
        }
    </script>
</body>

</html>
